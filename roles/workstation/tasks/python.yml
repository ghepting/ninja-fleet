- name: python | Install pyenv (macOS)
  community.general.homebrew:
    name: pyenv
    state: present
  when: ansible_facts['os_family'] == 'Darwin'
  tags: [python, pyenv]

- name: python | Install pyenv (Debian/Ubuntu)
  ansible.builtin.apt:
    name: pyenv
    state: present
  when: ansible_facts['pkg_mgr'] == 'apt'
  become: true
  tags: [python, pyenv]

- name: python | Install pyenv (Fedora)
  when: ansible_facts['pkg_mgr'] == 'dnf'
  become: true
  ansible.builtin.dnf:
    name:
      - pyenv
    state: present
  tags: [python, pyenv]

- name: python | Install pyenv (Arch)
  community.general.pacman:
    name:
      - pyenv
    state: present
    update_cache: true
  when: ansible_facts['pkg_mgr'] == 'pacman'
  become: true
  tags: [python, pyenv]

- name: python | Initialize pyenv in .zshrc
  ansible.builtin.blockinfile:
    path: "~/.zshrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: PYENV"
    block: |
      export PYENV_ROOT="$HOME/.pyenv"
      [[ -d $PYENV_ROOT/bin ]] && export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init - zsh)"
  tags: [python, pyenv]

- name: python | Install latest python (via pyenv)
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      export PYENV_ROOT="$HOME/.pyenv"
      [[ -d $PYENV_ROOT/bin ]] && export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init - zsh)"
      latest_python=$(pyenv install -l | grep -v - | grep -v '[a-zA-Z]' | tail -1 | tr -d '[:space:]')
      if ! pyenv versions | grep -q $latest_python; then
        pyenv install $latest_python
        pyenv global $latest_python
      fi
    executable: /bin/zsh
  tags: [python, pyenv]
